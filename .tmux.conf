set-option -g default-command 'zsh'
set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

bind -r m resize-pane -Z

unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf

bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
bind K confirm kill-session

set -g mouse on

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# List of plugins
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @catppuccin_flavour 'frappe'
set -g @catppuccin_status_modules_right "gitmux directory application session"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_window_current_color "#{thm_pink}"
set -g @catppuccin_window_current_background "#{thm_gray}"
set -g @catppuccin_window_default_color "#{thm_cyan}"
set -g @catppuccin_directory_color "#{thm_blue}"
set -g @catppuccin_gitmux_hide_empty "true"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
