include catppuccin.conf

font_family                  FiraMono Nerd Font Mono
font_size                    11.0
scrollback_lines             10000
scrollback_indicator_opacity 1.0
mouse_hide_wait              -1.0
detect_urls                  yes
copy_on_select               yes
enable_audio_bell            no
visual_bell_duration         0.0
hide_window_decorations      yes

macos_quit_when_last_window_closed yes

# tab_bar_edge                 top
# tab_bar_style                separator
# tab_separator                "     "
# tab_fade                     0 0 0 0
# tab_title_template           "{index} | {tab.active_exe}"
# tab_activity_symbol          none
# tab_bar_margin_height        0.0 0.0
# active_tab_font_style        bold
# inactive_tab_font_style      normal
# tab_bar_min_tabs             0
# bell_on_tab                  no
# tab_bar_background           #303440

enabled_layouts              vertical,horizontal,stack
map kitty_mod+m              toggle_layout stack
map kitty_mod+-              launch --location=hsplit --cwd=current
map kitty+mod+\              launch --location=hsplit --cwd=current

include macos.conf
